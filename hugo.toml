baseURL = "https://hannablog.netlify.app/"
languageCode = "en-us"
title = "Hanna's Blog"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  author = "Hanna"
  description = "Thoughts on Spain, IT, and life in between."
  keywords = ["blog", "spain", "tech", "travel"]
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false
  comments = false

  [params.homeInfoParams]
    Title = "Hi, I'm Hanna"
    Content = "Welcome to my blog — where I write about life in Spain, tech, and whatever else catches my attention."

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40
